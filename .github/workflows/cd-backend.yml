name: CD Backend

on:
  push:
    branches:
      - main
    
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set Short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: lazuardiyasfin
          password: ${{ secrets.GHCR_PAT }}      
    
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/lazuardiyasfin/carbonfreeclass-backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Enable build cache for faster builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps: 
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Copy Compose files to VPS
        run: |  
          cat << EOF > .env
          BACKEND_DOMAIN=${{ secrets.BACKEND_DOMAIN }}
          IMAGE_TAG=${{ needs.build-and-push.outputs.short_sha }}
          EOF

          rsync -avz -e "ssh -o StrictHostKeyChecking=no" --mkpath compose.yaml compose.prod.yaml .env ec2-user@${{ secrets.VPS_TAILSCALE_IP }}:/home/ec2-user/app/backend/

      - name: Deploy to VPS via Tailscale SSH
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ secrets.VPS_TAILSCALE_IP }} << 'EOF'
            cd /home/ec2-user/app/backend
            
            docker compose -f compose.yaml -f compose.prod.yaml pull
            docker compose -f compose.yaml -f compose.prod.yaml up -d --remove-orphans
          EOF